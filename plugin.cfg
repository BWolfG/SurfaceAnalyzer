[plugin]

name="SurfaceAnalyzer"
description="Surface Analyzer is a plugin that helps you get material and surface metadata using raycast.
When you enable the plugin, the SurfaceAnalyzer script is added to Globals. Using its internal get_surface_meta() method, you can get material metadata, and using get_surface_material(), you can get the material itself."
author="BWolf"
version="0.1"
script="plugin.gd"
